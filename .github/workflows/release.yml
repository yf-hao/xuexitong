name: Build and Release

on:
  push:
    branches:
      - main  # 当你推送到 main 分支时自动触发检查
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      is_new_version: ${{ steps.check.outputs.is_new_version }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.extract_changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version is bumped
        id: check
        run: |
          # 从 core/config.py 中使用 grep 提取 V0.2 这种格式的版本号
          # 寻找类似 APP_TITLE = "...V0.2" 的行
          VERSION_RAW=$(grep "APP_TITLE =" core/config.py | grep -oE "V[0-9]+(\.[0-9]+)*" | head -n 1)
          # 去掉前面的 V 得到干净的版本号 (如 0.2)
          VERSION=${VERSION_RAW#V}
          TAG="v$VERSION"
          
          echo "Current Version: $VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. No need to release."
            echo "is_new_version=false" >> $GITHUB_OUTPUT
          else
            echo "New version $TAG detected! Triggering release."
            echo "is_new_version=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Extract Latest Changelog
        if: steps.check.outputs.is_new_version == 'true'
        id: extract_changelog
        run: |
          # 提取 RELEASE_NOTES.md 中第一个 "# 版本说明" 到下一个之间的内容
          PYTHON_CMD="
          import sys
          try:
              with open('RELEASE_NOTES.md', 'r', encoding='utf-8') as f:
                  content = f.read()
              import re
              # 匹配第一块 '# 版本说明' 部分
              match = re.search(r'(# 版本说明.*?)(?=\n# 版本说明|$)', content, re.S)
              if match:
                  print(match.group(1).strip())
              else:
                  print('✨ 新版本发布')
          except Exception as e:
              print(f'Release version update: {e}')
          "
          BODY=$(python3 -c "$PYTHON_CMD")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  publish:
    permissions:
      contents: write
    needs: check-version
    if: needs.check-version.outputs.is_new_version == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm
            spec: xuexitong_mac.spec
            executable: XuexitongManager
            arch: arm64
          - os: macos-15-intel    # 使用 macos-15-intel 作为标准免费的 Intel (x64) 计算节点
            platform: macos-intel
            spec: xuexitong_mac.spec
            executable: XuexitongManager
            arch: ''
          - os: ubuntu-22.04
            platform: linux
            spec: xuexitong_linux.spec
            executable: XuexitongManager
            arch: ''
          - os: windows-latest
            platform: windows
            spec: xuexitong_win.spec
            executable: XuexitongManager.exe
            arch: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests bs4 lxml openpyxl xlrd certifi PyQt6 opencv-python numpy pycryptodome

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.arch }}" != "" ]; then
            export ARCH=${{ matrix.arch }}
            pyinstaller --clean ${{ matrix.spec }}
          else
            pyinstaller --clean ${{ matrix.spec }}
          fi
        shell: bash

      - name: Package artifact (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          chmod +x ${{ matrix.executable }}
          tar -czvf XuexitongManager-${{ matrix.platform }}.tar.gz ${{ matrix.executable }}

      - name: Package artifact (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          cd dist
          # 压缩生成的 .app 文件夹
          tar -czvf XuexitongManager-${{ matrix.platform }}.tar.gz XuexitongManager.app

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          7z a XuexitongManager-${{ matrix.platform }}.zip ${{ matrix.executable }}

      - name: Create Release
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: XuexitongManager v${{ needs.check-version.outputs.version }}
          body: ${{ needs.check-version.outputs.changelog }}
          files: |
             dist/XuexitongManager-*.tar.gz
             dist/XuexitongManager-*.zip
          generate_release_notes: false

      - name: Upload additional assets
        if: matrix.os != 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
             dist/XuexitongManager-*.tar.gz
             dist/XuexitongManager-*.zip
